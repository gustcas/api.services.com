name: Deploy Laravel API to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Laravel API on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            export COMPOSER_ALLOW_SUPERUSER=1

            APP_DIR="/home/services-api/htdocs/api.services.com/api-servicios"

            usermod -aG services-api clp || true
            usermod -aG services-api eservices || true

            chmod 750 /home/services-api
            chmod 770 /home/services-api/htdocs

            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"
            git remote set-url origin https://github.com/gustcas/api.services.com.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e storage/** -e .env

            mkdir -p storage/framework/cache/data \
                     storage/framework/sessions \
                     storage/framework/views \
                     storage/logs \
                     bootstrap/cache

            touch storage/logs/laravel.log

            rm -rf public/storage
            /usr/bin/php7.4 artisan storage:link || true
            chown -h eservices:services-api public/storage || true

            chown -R eservices:services-api "$APP_DIR"
            chown -R clp:services-api storage bootstrap/cache
            chown -R clp:services-api storage/app/public

            find storage bootstrap/cache -type d -exec chmod 2775 {} \;
            find storage bootstrap/cache -type f -exec chmod 664 {} \;

            chmod 666 storage/logs/laravel.log

            if command -v setfacl >/dev/null 2>&1; then
              setfacl -R -m u:clp:rwx,u:eservices:rwx,g:services-api:rwx storage bootstrap/cache
              setfacl -R -d -m u:clp:rwx,u:eservices:rwx,g:services-api:rwx storage bootstrap/cache
            fi

            /usr/bin/php7.4 /usr/local/bin/composer install --no-dev --optimize-autoloader
            /usr/bin/php7.4 artisan migrate --force

            /usr/bin/php7.4 artisan config:clear
            /usr/bin/php7.4 artisan cache:clear
            /usr/bin/php7.4 artisan route:clear
            /usr/bin/php7.4 artisan view:clear

            /usr/bin/php7.4 artisan config:cache
            /usr/bin/php7.4 artisan route:cache
            /usr/bin/php7.4 artisan view:cache

            chown -R clp:services-api storage bootstrap/cache
            chown -R clp:services-api storage/app/public

            find storage bootstrap/cache -type d -exec chmod 2775 {} \;
            find storage bootstrap/cache -type f -exec chmod 664 {} \;

            chmod 666 storage/logs/laravel.log
            chown -h eservices:services-api public/storage || true

            systemctl restart php7.4-fpm || true
            systemctl reload nginx || true

            echo "✅ Laravel API deploy completed successfully"